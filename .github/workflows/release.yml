name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Set version in package.json and openclaw.plugin.json
        run: |
          npm version "${{ steps.version.outputs.VERSION }}" --no-git-tag-version
          node -e "
            const fs = require('fs');
            const o = JSON.parse(fs.readFileSync('./openclaw.plugin.json', 'utf-8'));
            o.version = '${{ steps.version.outputs.VERSION }}';
            fs.writeFileSync('./openclaw.plugin.json', JSON.stringify(o, null, 2) + '\n');
          "

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build

      - name: Pack
        run: npm pack

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: cursor-agent-${{ steps.version.outputs.VERSION }}.tgz
